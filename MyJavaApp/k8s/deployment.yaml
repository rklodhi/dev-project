apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-deployment
  labels:
    app: java-app
  annotations:
    argocd-image-updater.argoproj.io/image-list: java-app=rakesh007lodhi079/java-app
    argocd-image-updater.argoproj.io/java-app.update-strategy: newest-build
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
      - name: java-app
        image: rakesh007lodhi079/java-app
        ports:
        - containerPort: 8080
        imagePullPolicy: Always
